<!DOCTYPE html>
<html>
<head>



<title>Movie Rating List</title>

<style>
    body
    {
        font-family: Arial, Helvetica, sans-serif;
        background-image: 
                linear-gradient(rgba(186, 154, 174, 0.531), rgba(48, 22, 38, 0.822)), 
                url('PurpleLilac.JPG');
                display: flex;
                flex-direction: column;
                align-items: center;



    }

    h1
    {
        
        font-family:Arial, Helvetica, sans-serif; 
                text-align: center;
                font-size: 50px;
                color: rgb(52, 41, 54);
                margin-top: 0;
    }

    h4
    {
        font-family: Arial, Helvetica, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
    }

    .card
    {
        background-color: rgb(255, 255, 255);
                width: 700px;
                margin: 20px auto;
                padding: 20px 20px;
                border-radius: 18px;
                box-shadow: 0 6px 18px rgba(44, 27, 36, 0.906); 
    }

    .star
    {
        font-size: 25px;
        cursor: pointer;
        color: rgb(42, 30, 28);
    }

    .star.active
    {
        color:gold;
    }

    button
            {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 25px;
                font-weight: bold;
                padding: 10px 18px;
                border-radius: 8px;
                background-color: rgba(217, 202, 215, 0.285);
                border: none;
                cursor: pointer;
                transition: background-color 0.2s ease, transform 0.1s ease;
            }

    #movieList
    {
        text-align: center;
    }

    #movieList p
    {
        font-size: 24px;
    }

    label
    {
        font-size: 24px;
        font-weight: bold;
        align-items: center;
    }

</style>

</head>

<body>

    <div class="card">

        <h1>⋆°✩✦ Adding a Movie⋆°✩✦ </h1>
        <h4>__________________________________</h4>
    
        <form id="movieForm">
    
            <label>Movie Title</label><br>
            <input type="text" id="title" required>
    
            <br><br>
    
            <label>Genre</label><br>
                <select id="genre">
                    <option>Action</option>
                    <option>Horror</option>
                    <option>Comedy</option>
                    <option>Drama</option>
                </select>
    
            <br><br>
    
            <label>Rating: </label><br>
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            <input type="hidden" id="rating">
    
            <br><br>
    
            <button type="submit">Add Movie</button>
    
        </form>
    
    </div>
    
    <div class="card">
    
        <h1>⋆｡°✩₊✦ Movie List⋆｡°✩₊✦ </h1>
        <h4>______________________________</h4>
        
        <div id="movieList"></div>

<script>

// had to do a HARD reset because for Graded 2 I kept running into ISSUES, oh my lord

// Selecting all of the elements, that we will be USING-- using the their Ids and .getElem
let stars = document.querySelectorAll(".star");
let ratingInput = document.getElementById("rating");
const movieForm = document.getElementById("movieForm");
const movieList = document.getElementById("movieList");

// STAR CLICK! 

stars.forEach(function(star) 
{
    star.addEventListener("click", function() 
    {
        let rating = Number(this.dataset.value);
        // gets the value inputted from user, the rating & saves it in the line below NUMERICALLY ykyk
        ratingInput.value = rating;

        stars.forEach(s => s.classList.remove("active")); 
        // reset the gold stars, clears it
        for (let i = 0; i < rating; i++) 
        {
            stars[i].classList.add("active"); 
            // highlight selected stars once they're ACTIVE on click
        }
    });
});

// SHOW MOVIES FUNCTION!

function showMovies() 
{
    const movies = JSON.parse(localStorage.getItem("movies")) || [];
    // goes through the saved movies in local storage, saved in movies
    movieList.innerHTML = "";
    // clears movie List before doing allat again

    movies.forEach(function(movie, index) 
    {
        let starCount = Math.round(Number(movie.rating));
        // makes them WHOLE NUMBERS, no fixed decimal place...
        let starsHTML = "★".repeat(starCount);
        // using the star count-- it shows the avrged value

        movieList.innerHTML += `
            <p>
                <b>${movie.title}</b> (${movie.genre})<br>
                <span style="color: gold">${starsHTML}</span> (${Number(movie.rating)})<br>
                <button onclick="deleteMovie(${index})">Delete</button>
            </p>
        `;
        // this is the literal way to tie it back to HTML, & the formatting you do see 
    });
}

// DELETE MOVIE FUNCTION!

function deleteMovie(index) 
{
    if (confirm("Really? You're going to delete this movie?")) 
    // confirming if you do want to delete it 
    {
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        movies.splice(index, 1);
        // it just removes that item you got from localStorage 
        localStorage.setItem("movies", JSON.stringify(movies));
        //turns it into a string again to use 
        showMovies();
    }
}

// FORM SUBMIT LOGIC / FORM SUBMIT LOGIC!

movieForm.addEventListener("submit", function(e) 
{
    e.preventDefault();
    // IT'S THE SAME EXPLANATIOON AS BEFORE! added so the page doesn't refregesh on submission

    let title = document.getElementById("title").value.trim();
    let genre = document.getElementById("genre").value;
    let rating = Number(ratingInput.value);
    // makes the rating a NUMBER, not js a value u got from the previous like a strng 

    if (!title || !rating) 
    {
        alert("Please enter a title and select a rating.");
        // makes sure BOTH are present when u try to make a submission 
        return;
    }

    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    let existingMovie = movies.find(m => m.title.toLowerCase() === title.toLowerCase());

    if (existingMovie) 
    {
        // If movie exists, we will UPDATE the rating here with average
        existingMovie.rating = Math.round(
            ((existingMovie.rating * existingMovie.ratingCount) + rating) / (existingMovie.ratingCount + 1));
        existingMovie.ratingCount += 1;
    } else 
    {
        // First time movie added, and it's not a repeat-- 
        movies.push({ title, genre, rating: rating, ratingCount: 1 });
    }

    localStorage.setItem("movies", JSON.stringify(movies));

    // Resets the form & stars
    movieForm.reset();
    ratingInput.value = "";
    stars.forEach(s => s.classList.remove("active"));

    showMovies();
});
</script>

</body>

</html>
